<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>EV·GG</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>

    <!-- layer 0: blobs -->
    <div id="blobs">
      <div class="blob blob-a"></div>
      <div class="blob blob-b"></div>
      <div class="blob blob-c"></div>
    </div>

    <!-- layer 1: 2D trail canvas -->
    <canvas id="trail-canvas"></canvas>

    <!-- layer 2: three.js canvas (torus + terrain) -->
    <canvas id="canvas"></canvas>

    <!-- layer 3: frame -->
    <div id="scene">
      <div class="card" id="card">

        <div class="card-face face-front">
          <div class="zone zone-a">
            <span class="zone-a-label">EVE·01</span>
            <span class="zone-a-status">Orbite de stationnement.</span>
          </div>
          <div class="zone zone-b">
            <span class="frame-title">EV·GG</span>
          </div>
          <div class="zone zone-c"></div>
          <div class="zone zone-d">
            <div class="zone-d-left">
              <span>46°06'N &nbsp;7°16'E — 1500M</span>
              <span>Durée non communiquée.</span>
            </div>
            <div class="zone-d-right">
              <span>26–29</span>
              <span>Juin 2026</span>
            </div>
          </div>
          <div class="zone zone-e">
            <button class="frame-cta" id="cta">
              Consulter le plan de vol <span class="arrow">→</span>
            </button>
          </div>
        </div>

        <div class="card-face face-back">
          <div class="program-header">
            <span>Plan de vol &nbsp;EV·GG</span>
            <button class="program-close" id="close">✕ &nbsp;Fermer</button>
          </div>
          <div class="program-days" id="program-days"></div>
        </div>

      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
